<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Biotech Blog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="dnaCanvas"></canvas>

<header>
  <h1>BIOTECH FUTURE</h1>
  <p>Engineering Life Through Science</p>
</header>

<section class="hero">
  <h2>Rewriting Life Through Biotechnology</h2>
</section>

<section class="articles">
  <h2>Latest Articles</h2>

  <div class="card" onclick="openBlog('crispr')">CRISPR Explained</div>
  <div class="card" onclick="openBlog('ethics')">Gene Editing Ethics</div>
  <div class="card" onclick="openBlog('future')">Future of De-Extinction</div>
</section>

<div id="blogModal" class="modal">
  <div class="modal-content">
    <span onclick="closeBlog()" class="close">&times;</span>
    <h2 id="blogTitle"></h2>
    <p id="blogContent"></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
